name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint + format check
        run: bun run check
      - name: Test
        run: bun test
      - name: Build
        run: bun run build

  eval-gate:
    name: eval gate (stub)
    runs-on: ubuntu-latest
    # Eval gate enforcement + fork-PR strategy (ADR 0003, ADR 0004). The gate runs
    # against the deterministic `stub` provider — no secrets, no spend — so it can
    # block regressions hermetically. It runs on:
    #   - pushes to main (full suite),
    #   - same-repo PRs (smoke suite), and
    #   - fork PRs only after a maintainer applies the `eval-approved` label.
    # Fork PRs without the label get build + secret-scan only; branch protection
    # makes this check required, so a fork PR cannot merge ungated.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'eval-approved')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Eval gate — full suite (push to main)
        if: github.event_name == 'push'
        run: bun run reliability eval gate --provider stub --max-cost 0.50
      - name: Eval gate — smoke suite (pull request)
        if: github.event_name == 'pull_request'
        run: bun run reliability eval gate --provider stub --first-n 6 --max-cost 0.50

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
